name: CI

# Continuous integration only: lint-level typecheck + unit tests on every push/PR.
#
# Production deploys are handled by Cloudflare's native Git integration
# (Workers Builds), not from here — so there are no Cloudflare secrets in GitHub
# and no risk of double-deploying. Configure it once in the Cloudflare dashboard
# (Workers & Pages > the "exploding-kittens" Worker > Settings > Builds > Connect repo):
#   - Build command:  pnpm install && pnpm --filter @ek/shared build && pnpm --filter @ek/web build
#   - Deploy command: npx wrangler deploy
#   - Root directory: apps/worker   (where wrangler.toml lives)
# The single Worker serves the React app (static assets) + /api + the GameRoom
# Durable Object, so one deploy ships everything.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests (rules engine)
        run: pnpm --filter @ek/shared test
      - name: Typecheck
        run: pnpm -r typecheck
