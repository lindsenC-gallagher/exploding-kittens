name: Production E2E

# Manual, on-demand Playwright multi-player e2e run against ANY live URL.
#
# The automatic post-deploy e2e run lives in the "CI & Deploy" workflow
# (deploy.yml: test -> deploy -> e2e). This workflow is the standalone tool for
# pointing the same suite at an arbitrary URL — production, a preview, etc.
# The health-wait step below tolerates a deploy still being in flight.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        default: 'https://exploding-kittens.lindsen-cruz.workers.dev'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://exploding-kittens.lindsen-cruz.workers.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for production to be healthy
        run: |
          echo "Waiting for $E2E_BASE_URL/api/health ..."
          for i in $(seq 1 30); do
            if curl -fsS "$E2E_BASE_URL/api/health" >/dev/null; then
              echo "Healthy."; exit 0
            fi
            sleep 5
          done
          echo "Production did not become healthy in time"; exit 1
      - name: Run e2e against production
        run: pnpm exec playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-playwright-report
          path: playwright-report/
          retention-days: 7
