name = "exploding-kittens"
main = "src/index.ts"
# Kept current so the Worker runs under recent, hardened runtime defaults.
compatibility_date = "2025-09-01"
# nodejs_compat dropped: the Worker uses only Web/Workers APIs (crypto, URL,
# WebSocketPair, Durable Objects), so the Node polyfills are unnecessary surface.

# Optional: lock CORS + the WebSocket upgrade to your exact origin(s). When unset,
# the Worker allows localhost and *.pages.dev / *.workers.dev (see src/index.ts).
# [vars]
# ALLOWED_ORIGINS = "https://your-app.example.com"

# Serve the built React app as static assets from this same Worker. The Worker
# runs first (so /api/* and the WebSocket upgrade hit our code); everything else
# is served from the asset store, with SPA fallback to index.html for client routes.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Durable Object: one GameRoom instance per lobby/room code.
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
# SQLite-backed Durable Object: works on the Workers free plan and paid.
# The KV-style storage API (get/put/setAlarm) is supported on this backend.
new_sqlite_classes = ["GameRoom"]

[observability]
enabled = true
